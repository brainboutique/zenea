# Explicit document root for Laravel + Angular SPA.
# Ensures static assets (e.g. /icons/*.png) are served from /php/public.
<VirtualHost *:80>
	ServerAdmin webmaster@localhost
	DocumentRoot /php/public

	<Directory /php/public>
		Options -MultiViews -Indexes +FollowSymLinks
		AllowOverride All
		Require all granted
	</Directory>

	ErrorLog ${APACHE_LOG_DIR}/error.log
	CustomLog ${APACHE_LOG_DIR}/access.log combined
</VirtualHost>
