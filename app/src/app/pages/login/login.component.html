<div class="login-container">
  <mat-card class="login-card">
    <mat-card-header>
      <mat-card-title>{{ 'Login' | translate }}</mat-card-title>
    </mat-card-header>
    <mat-card-content>
      <form (ngSubmit)="onSubmit()" class="login-form">
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>{{ 'Username' | translate }}</mat-label>
          <input matInput [(ngModel)]="username" name="username" [disabled]="isLoading" autocomplete="username" />
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>{{ 'Password' | translate }}</mat-label>
          <input matInput type="password" [(ngModel)]="password" name="password" [disabled]="isLoading" autocomplete="current-password" />
        </mat-form-field>

        @if (errorMessage) {
          <div class="error-message">{{ errorMessage }}</div>
        }

        <div class="actions">
          @if (isLoading) {
            <mat-spinner diameter="24"></mat-spinner>
          } @else {
            <button mat-raised-button color="primary" type="submit">{{ 'Login' | translate }}</button>
          }
        </div>
      </form>
    </mat-card-content>
  </mat-card>
</div>
