<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>ZenEA</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <!-- Preconnect so font requests start immediately -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <!-- Block first paint until fonts are ready to avoid FOUT -->
  <style>html:not(.fonts-loaded) body{visibility:hidden} html.fonts-loaded body{visibility:visible}</style>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
  <script>
    (function(){
      function show(){ document.documentElement.classList.add('fonts-loaded'); }
      var t = setTimeout(show, 3000);
      if (document.fonts && document.fonts.ready) {
        document.fonts.ready.then(function(){ clearTimeout(t); show(); });
      } else { clearTimeout(t); show(); }
    })();
  </script>
</head>
<body class="mat-typography">
  <app-root></app-root>
</body>
</html>
