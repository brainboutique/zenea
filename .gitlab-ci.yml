# Build zenea, create a GitLab release, publish Docker image to Container Registry, and optionally deploy via SCP.
# Requires: Node (Angular), PHP + Composer (Laravel), tar. Docker image build uses Docker-in-Docker.

default:
  image: shivammathur/node:php-8.4-trixie

variables:
  COMPOSER_ALLOW_SUPERUSER: "1"

stages:
  - test
  - build
  - docker
  - release
  - deploy

# Cache app node_modules and PHP vendor to speed up later runs
cache:
  key: "${CI_COMMIT_REF_SLUG}-zenea"
  paths:
    - app/node_modules
    - php/vendor

# Run PHP unit tests
test:
  stage: test
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH
  before_script:
    # Install SQLite PDO extension for tests (required for RefreshDatabase trait)
    - |
      if ! php -m | grep -q pdo_sqlite; then
        apt-get update -qq && apt-get install -y -qq php8.4-sqlite3 2>/dev/null || \
        apt-get install -y -qq php-sqlite3 2>/dev/null || \
        echo "Warning: Could not install pdo_sqlite extension"
      fi
    - |
      if ! command -v composer >/dev/null 2>&1; then
        curl -sS https://getcomposer.org/installer | php -- --install-dir=/usr/local/bin --filename=composer
      fi
    # Align Composer platform with image PHP (8.4) so lock file installs
    - composer config platform.php 8.4 --working-dir ./php
    - composer install --no-interaction --prefer-dist --working-dir ./php
  script:
    - cd php
    - php vendor/bin/phpunit --testdox
  coverage: '/^\s*Lines:\s*\d+.\d+\%/'
  artifacts:
    reports:
      junit: php/tests/results.xml
    paths:
      - php/tests/results.xml
    expire_in: 1 week
    when: always

build-release:
  stage: build
  rules:
    - if: $CI_COMMIT_BRANCH == "master"
  needs:
    - job: test
  before_script:
    - npm ci --prefix ./app
    - |
      if ! command -v composer >/dev/null 2>&1; then
        curl -sS https://getcomposer.org/installer | php -- --install-dir=/usr/local/bin --filename=composer
      fi
    # Align Composer platform with image PHP (8.4) so lock file installs
    - composer config platform.php 8.4 --working-dir ./php
  script:
    - npm run release
  artifacts:
    paths:
      - ZenEA.tgz
      - build-number.txt
    name: "zenea-${CI_COMMIT_REF_SLUG}-build"
    expire_in: 1 week

# Build and publish Docker image to GitLab Container Registry (master only).
docker-build:
  stage: docker
  image: docker:24
  services:
    - docker:24-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  rules:
    - if: $CI_COMMIT_BRANCH == "master"
  needs:
    - job: build-release
  before_script:
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" "$CI_REGISTRY"
  script:
    - BUILD_NUMBER=$(cat build-number.txt)
    - docker build --build-arg RELEASE_BUILD_NUMBER="$BUILD_NUMBER" -t "$CI_REGISTRY_IMAGE:build-${BUILD_NUMBER}" -t "$CI_REGISTRY_IMAGE:latest" -t "$CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA" .
    - docker push "$CI_REGISTRY_IMAGE:build-${BUILD_NUMBER}"
    - docker push "$CI_REGISTRY_IMAGE:latest"
    - docker push "$CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA"

# Create a GitLab release using the same build number as in build.MD (YYMMDD-X).
# Only on master to avoid pipelines triggered by tags creating new tags (infinite loop).
# release-cli is run in script so we can use the build number from the build-number.txt artifact.
release:
  stage: release
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  rules:
    - if: $CI_COMMIT_BRANCH == "master"
  needs:
    - job: build-release
  script:
    - BUILD_NUMBER=$(cat build-number.txt)
    - ASSET_URL="${CI_PROJECT_URL}/-/jobs/artifacts/${CI_COMMIT_REF_SLUG}/raw/ZenEA.tgz?job=build-release"
    - echo "Creating release build-${BUILD_NUMBER}"
    - |
      release-cli create \
        --tag-name "build-${BUILD_NUMBER}" \
        --name "Build ${BUILD_NUMBER}" \
        --description "Auto-release ${BUILD_NUMBER} (${CI_COMMIT_SHORT_SHA})" \
        --ref "$CI_COMMIT_SHA" \
        --assets-link "{\"name\":\"ZenEA.tgz\",\"url\":\"${ASSET_URL}\"}"
    - echo "Deploying build ${BUILD_NUMBER}"
    - apk add --no-cache curl
    - >
      curl
      -H "Job-Token: $CI_JOB_TOKEN"
      -X PUT
      --data "name=$BUILD_NUMBER"
      $CI_API_V4_URL/projects/$CI_PROJECT_ID/pipelines/$CI_PIPELINE_ID/metadata
    - sleep 30
    # - curl -f -S -s "http://control.zenea.cc/zenea_deploy.php"

# Publish Docker image to Docker Hub as brainboutique/zenea:<tagname>.
# Pushes the same tags as GitLab CR: build-<number>, latest, <commit-sha>. Requires CI/CD variables: DOCKERHUB_USER, DOCKERHUB_TOKEN.
docker-push-dockerhub:
  stage: release
  image: docker:24
  services:
    - docker:24-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  rules:
    - if: $CI_COMMIT_BRANCH == "master"
  needs:
    - job: build-release
    - job: docker-build
  before_script:
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" "$CI_REGISTRY"
    - echo "$DOCKERHUB_TOKEN" | docker login -u "$DOCKERHUB_USER" --password-stdin docker.io
  script:
    - BUILD_NUMBER=$(cat build-number.txt)
    - TAG_RELEASE="build-${BUILD_NUMBER}"
    - docker pull "$CI_REGISTRY_IMAGE:${TAG_RELEASE}"
    - docker pull "$CI_REGISTRY_IMAGE:latest"
    - docker pull "$CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA"
    - docker tag "$CI_REGISTRY_IMAGE:${TAG_RELEASE}" brainboutique/zenea:${TAG_RELEASE}
    - docker tag "$CI_REGISTRY_IMAGE:latest" brainboutique/zenea:latest
    - docker tag "$CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA" brainboutique/zenea:$CI_COMMIT_SHORT_SHA
    - docker push brainboutique/zenea:${TAG_RELEASE}
    - docker push brainboutique/zenea:latest
    - docker push brainboutique/zenea:$CI_COMMIT_SHORT_SHA
